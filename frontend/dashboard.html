<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto p-8">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold mb-4">Welcome to Your Dashboard! 🎉</h1>
            <p class="text-gray-600 mb-6">You have successfully logged in.</p>
            
            <div class="border-t pt-4">
                <p class="text-sm text-gray-500">This is a protected page. Only logged-in users can see this.</p>
                <button onclick="logout()" class="mt-4 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Logout
                </button>
            </div>
        </div>
    </div>
    
    <script>
        function logout() {
            // Clear session
            document.cookie = "session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
